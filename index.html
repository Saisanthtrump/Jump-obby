<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧱 OBBY BLOX</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#0d0d1a;font-family:'Fredoka One',cursive;overflow:hidden;user-select:none;}

  #ui{
    position:fixed;top:0;left:0;right:0;z-index:100;
    display:flex;justify-content:space-between;align-items:center;
    padding:9px 18px;
    background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);
    border-bottom:2px solid #00f5ff;
  }
  #title{font-size:1.4rem;color:#00f5ff;text-shadow:0 0 12px #00f5ff,0 0 28px #00f5ff;letter-spacing:2px;}
  #stats{display:flex;gap:16px;font-size:.9rem;font-family:'Nunito',sans-serif;font-weight:800;}
  .stat{color:#fff;display:flex;align-items:center;gap:4px;}
  .stat span{color:#ffe600;text-shadow:0 0 6px #ffe600;}
  #hint{font-size:.68rem;color:rgba(255,255,255,.42);font-family:'Nunito',sans-serif;}

  canvas{display:block;margin-top:50px;}

  #overlay{
    position:fixed;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    background:rgba(6,4,18,.95);z-index:200;gap:16px;
  }
  #overlay h1{
    font-size:3rem;color:#00f5ff;letter-spacing:4px;
    text-shadow:0 0 18px #00f5ff,0 0 50px #00f5ff;
    animation:pulse 1.6s ease-in-out infinite;
  }
  #overlay p{
    font-family:'Nunito',sans-serif;font-size:1rem;
    color:rgba(255,255,255,.65);text-align:center;max-width:440px;line-height:1.7;
  }
  .world-grid{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;}
  .wcard{
    background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.12);
    border-radius:18px;padding:18px 22px;text-align:center;min-width:148px;
    transition:transform .15s,box-shadow .15s;
  }
  .wcard.unlocked{cursor:pointer;border-color:rgba(255,255,255,.28);}
  .wcard.unlocked:hover{transform:translateY(-5px);}
  .wcard.locked{opacity:.5;cursor:not-allowed;filter:grayscale(.5);}
  .wcard .wicon{font-size:2.2rem;display:block;margin-bottom:5px;}
  .wcard .wname{font-size:1.1rem;color:#fff;display:block;}
  .wcard .wsub{font-family:'Nunito',sans-serif;font-size:.76rem;color:rgba(255,255,255,.45);display:block;margin-top:2px;}
  .wcard .wreq{font-family:'Nunito',sans-serif;font-size:.8rem;color:#ffe600;margin-top:6px;display:block;}

  .play-btn{
    font-family:'Fredoka One',cursive;font-size:1.35rem;letter-spacing:2px;
    padding:13px 42px;border:none;border-radius:50px;color:#fff;cursor:pointer;
    background:linear-gradient(135deg,#ff2d78,#bf5fff);
    box-shadow:0 0 24px #ff2d78aa;
    animation:floatBtn 2s ease-in-out infinite;
    transition:transform .12s;
  }
  .play-btn:hover{transform:scale(1.07);}
  .play-btn.green{background:linear-gradient(135deg,#39ff14,#00c87a);color:#000;box-shadow:0 0 24px #39ff14aa;}
  .play-btn.cyan{background:linear-gradient(135deg,#00f5ff,#bf5fff);color:#000;box-shadow:0 0 24px #00f5ffaa;}
  .play-btn.gold{background:linear-gradient(135deg,#ffe600,#ff9900);color:#000;box-shadow:0 0 24px #ffe600aa;}

  #pbar-wrap{position:fixed;bottom:0;left:0;right:0;height:7px;background:rgba(255,255,255,.08);z-index:100;}
  #pbar{height:100%;width:0%;background:linear-gradient(90deg,#ff2d78,#00f5ff,#39ff14);
    transition:width .3s;box-shadow:0 0 10px #00f5ff;}

  .toast{
    position:fixed;left:50%;transform:translateX(-50%) translateY(-14px);
    border-radius:40px;z-index:300;opacity:0;pointer-events:none;
    transition:opacity .3s,transform .3s;font-size:1.1rem;padding:9px 26px;
    font-family:'Fredoka One',cursive;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  #cp-toast{top:66px;background:linear-gradient(135deg,#39ff14,#00c87a);color:#000;box-shadow:0 0 16px #39ff14;}
  #blk-toast{top:108px;background:linear-gradient(135deg,#ffe600,#ff9900);color:#000;box-shadow:0 0 16px #ffe600;}
  #coin-toast{top:150px;background:linear-gradient(135deg,#ffdd00,#ffaa00);color:#000;box-shadow:0 0 16px #ffdd00;}

  @keyframes pulse{
    0%,100%{text-shadow:0 0 18px #00f5ff,0 0 50px #00f5ff;}
    50%{text-shadow:0 0 36px #00f5ff,0 0 90px #00f5ff,0 0 140px #00f5ff;}
  }
  @keyframes floatBtn{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}
</style>
</head>
<body>

<!-- SHOP OVERLAY -->

<script>
// ═══════════════════════════════════
//  WORLD CONFIG
// ═══════════════════════════════════
const WORLDS = {
  1:{
    id:1, label:'World 1', icon:'🌈', sub:'Neon Rainbow', unlockBlocks:0, uiBorder:'#00f5ff', stages:5,
    platColors:['#ff2d78','#ff6b35','#ffe600','#39ff14','#00f5ff','#bf5fff','#ff9dce','#ff4444','#00ffaa','#ffaa00'],

// ═══════════════════════════════════

// ═══════════════════════════════════
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
canvas.width  = window.innerWidth;
canvas.height = window.innerHeight - 50;

// ═══════════════════════════════════
//  STATE
// ═══════════════════════════════════
let gameRunning=false, deaths=0, elapsed=0, lastTime=0;
let checkpoint=null, currentStage=0, currentWorld=1, cameraX=0;

const keys={};
window.addEventListener('keydown',e=>{keys[e.code]=true;e.preventDefault();});

const player={x:80,y:300,w:32,h:36,vx:0,vy:0,onGround:false,jumpCount:0,trail:[],squish:1,
  speedMult:1, jumpMult:1, fruitCount:0, activeFruits:[]
};
const particles=[];

// ═══════════════════════════════════
//  FRUITS
// ═══════════════════════════════════
const FRUITS=[
  {emoji:'🍎', name:'Apple',   color:'#ff2d2d', effect:'speed',  value:0.12, duration:8},
  {emoji:'🍌', name:'Banana',  color:'#ffe600', effect:'jump',   value:0.15, duration:8},
  {emoji:'🍊', name:'Orange',  color:'#ff9900', effect:'speed',  value:0.10, duration:10},
  {emoji:'🍇', name:'Grapes',  color:'#bf5fff', effect:'both',   value:0.08, duration:7},
  {emoji:'🍓', name:'Berry',   color:'#ff4488', effect:'speed',  value:0.14, duration:6},
  {emoji:'🍉', name:'Melon',   color:'#39ff14', effect:'jump',   value:0.20, duration:5},
  {emoji:'🥝', name:'Kiwi',    color:'#88cc44', effect:'both',   value:0.10, duration:9},
  {emoji:'🍑', name:'Peach',   color:'#ffaa66', effect:'speed',  value:0.08, duration:12},
  {emoji:'🍍', name:'Pineapple',color:'#ffdd00',effect:'jump',   value:0.18, duration:6},
  {emoji:'🥭', name:'Mango',   color:'#ff8800', effect:'both',   value:0.15, duration:8},
];
let levelFruits=[]; // active fruit items in the level

// ═══════════════════════════════════
//  REDEEM CODES
// ═══════════════════════════════════
const REDEEM_CODES={
  'OBBYBLOX':    { blocks:10, msg:'🎁 10 Blocks!' },
  'FREEBLOCKS':  { blocks:15, msg:'🎁 15 Blocks!' },
  'HIGHLANDS':   { blocks:25, msg:'🏔 25 Blocks! Highlands unlocked!' },
  'DUNGEONKEY':  { blocks:50, msg:'❄️ 50 Blocks! Almost at Dungeon!' },
  'SUPEROBBY':   { blocks:5,  msg:'⭐ 5 Bonus Blocks!' },
  'NEWWORLD':    { blocks:30, msg:'🌍 30 Blocks!' },
  'WELCOME':     { blocks:8,  msg:'👋 Welcome! 8 Blocks!' },
};
let usedCodes = JSON.parse(localStorage.getItem('obby_usedCodes')||'[]');

function redeemCode() {
  const input = document.getElementById('redeem-input');
  const msg   = document.getElementById('redeem-msg');
  const code  = input.value.trim().toUpperCase();

  if (!code) { showRedeemMsg('⚠️ Enter a code!', '#ff9900'); return; }
  if (usedCodes.includes(code)) { showRedeemMsg('❌ Already redeemed!', '#ff2d78'); return; }
  if (!REDEEM_CODES[code])      { showRedeemMsg('❌ Invalid code!', '#ff2d78'); return; }

  const reward = REDEEM_CODES[code];
  usedCodes.push(code);
  localStorage.setItem('obby_usedCodes', JSON.stringify(usedCodes));
  totalBlocks += reward.blocks;
  localStorage.setItem('obby_blocks', totalBlocks);
  document.getElementById('hud-blocks').textContent = totalBlocks;
  input.value = '';
  showRedeemMsg('✅ ' + reward.msg, '#39ff14');
  // Refresh menu cards
  setTimeout(showMenu, 1200);
}

function showRedeemMsg(text, color) {
  const msg = document.getElementById('redeem-msg');
  if (!msg) return;
  msg.textContent = text;
  msg.style.color = color;
  msg.style.opacity = '1';
  setTimeout(()=>{ if(msg) msg.style.opacity='0'; }, 2000);
}

function showRedeemMsg(text, color) {
  const msg = document.getElementById('redeem-msg');
  if (!msg) return;
  msg.textContent = text;
  msg.style.color = color;
  msg.style.opacity = '1';
  setTimeout(()=>{ if(msg) msg.style.opacity='0'; }, 2000);
}

// ═══════════════════════════════════

// Block shop items — price scales with player level
function getShopItems() {
  const lvl = playerLevel;
  return [

    { id:'blk10',  name:'10 Blocks',  icon:'🧱×10',         blocks:10, coins: Math.round(18 * lvl),  desc:'Good value!' },
    { id:'blk25',  name:'25 Blocks',  icon:'🧱×25',         blocks:25, coins: Math.round(40 * lvl),  desc:'Unlock Highlands!' },
    { id:'blk50',  name:'50 Blocks',  icon:'🧱×50',         blocks:50, coins: Math.round(75 * lvl),  desc:'Halfway to Dungeon!' },
    { id:'blk75',  name:'75 Blocks',  icon:'🧱×75',         blocks:75, coins: Math.round(110* lvl),  desc:'Unlock Ice World!' },
    { id:'blk100', name:'100 Blocks', icon:'💎 100 Blocks', blocks:100,coins: Math.round(140* lvl),  desc:'Mega pack!' },
  ];
}

function openShop() {
  const shop = document.getElementById('shop-overlay');
  renderShop();
  shop.style.display='flex';
  // Pause game while shopping
  gameRunning=false;
}

function closeShop() {
  document.getElementById('shop-overlay').style.display='none';
  if(level) gameRunning=true;
  else showMenu();
}

function renderShop() {
  const shop = document.getElementById('shop-overlay');
  const items = getShopItems();
  const itemsHTML = items.map(item=>{
    const canAfford = totalCoins >= item.coins;
    return `
      <div style="background:rgba(255,255,255,.07);border:2px solid ${canAfford?'rgba(255,230,0,.4)':'rgba(255,255,255,.1)'};

        opacity:${canAfford?1:.5};">
        <div style="font-size:1.4rem;margin-bottom:4px;">${item.icon}</div>
        <div style="font-family:'Fredoka One',cursive;font-size:1rem;color:#fff;">${item.name}</div>
        <div style="font-family:'Nunito',sans-serif;font-size:.75rem;color:rgba(255,255,255,.5);margin:3px 0;">${item.desc}</div>
        <div style="font-family:'Fredoka One',cursive;font-size:1.1rem;color:#ffe600;margin:6px 0;">💰 ${item.coins} coins</div>
        <button onclick="buyBlocks('${item.id}')"
          style="font-family:'Fredoka One',cursive;font-size:.9rem;padding:7px 18px;border:none;
          border-radius:20px;background:${canAfford?'linear-gradient(135deg,#ffe600,#ff9900)':'#444'};
          color:${canAfford?'#000':'#888'};cursor:${canAfford?'pointer':'not-allowed'};">
          ${canAfford?'BUY':'Too costly'}

  }).join('');

  shop.innerHTML=`

    <h1 style="font-size:2.4rem;color:#ffe600;text-shadow:0 0 16px #ffe600aa;letter-spacing:3px;">BLOCK SHOP</h1>
    <p style="font-family:'Nunito',sans-serif;color:rgba(255,255,255,.6);font-size:.95rem;">
      You have <b style="color:#ffe600">💰 ${totalCoins} coins</b> &nbsp;·&nbsp;
      <b style="color:#00f5ff">🧱 ${totalBlocks} blocks</b> &nbsp;·&nbsp;
      <b style="color:#bf5fff">Level ${playerLevel}</b>
    </p>
    <p style="font-family:'Nunito',sans-serif;color:rgba(255,150,0,.8);font-size:.82rem;">
      ⚠️ Higher level = more expensive blocks! Earn coins by completing stages.
    </p>
    <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;max-width:700px;">
      ${itemsHTML}
    </div>
    <div style="display:flex;gap:10px;margin-top:8px;">

        border-radius:30px;background:linear-gradient(135deg,#00f5ff,#bf5fff);color:#000;cursor:pointer;">
        ← Back

    <p style="font-family:'Nunito',sans-serif;font-size:.72rem;color:rgba(255,255,255,.25);">

function buyBlocks(itemId) {
  const item = getShopItems().find(i=>i.id===itemId);
  if(!item || totalCoins < item.coins) return;
  totalCoins -= item.coins;
  totalBlocks += item.blocks;
  playerLevel = Math.floor(totalBlocks / 20) + 1; // level up every 20 blocks
  localStorage.setItem('obby_coins', totalCoins);
  localStorage.setItem('obby_blocks', totalBlocks);
  localStorage.setItem('obby_level', playerLevel);
  document.getElementById('hud-coins').textContent = totalCoins;
  document.getElementById('hud-blocks').textContent = totalBlocks;
  renderShop(); // refresh shop with new prices
}

function earnCoins(amount, reason) {
  totalCoins += amount;
  localStorage.setItem('obby_coins', totalCoins);
  document.getElementById('hud-coins').textContent = totalCoins;
  const t = document.getElementById('coin-toast');
  t.textContent = `💰 +${amount} coins! (${reason})`;
  showToast('coin-toast', 1800);
}

      <p style="font-size:.85rem;color:#ffe600;font-family:'Fredoka One',cursive;letter-spacing:1px;">🎁 REDEEM A CODE</p>
      <div style="display:flex;gap:8px;align-items:center;">
        <input id="redeem-input" type="text" placeholder="Enter code..."
          style="font-family:'Fredoka One',cursive;font-size:1rem;padding:9px 16px;
          border-radius:30px;border:2px solid #ffe600;background:rgba(255,255,255,.08);
          color:#fff;outline:none;width:200px;text-align:center;letter-spacing:2px;"
          onkeydown="if(event.key==='Enter')redeemCode()"

          border:none;border-radius:30px;background:linear-gradient(135deg,#ffe600,#ff9900);
          color:#000;cursor:pointer;box-shadow:0 0 14px #ffe600aa;">
          REDEEM
        </button>
      </div>
      <p id="redeem-msg" style="font-family:'Nunito',sans-serif;font-size:.9rem;

// ═══════════════════════════════════
//  LEVEL GENERATOR
// ═══════════════════════════════════
function genLevel(wid) {
  const W=WORLDS[wid];
  const platforms=[],traps=[],checkpoints=[];

  // Spike helper — height capped so spikes never taller than their own width
  function addSpikes(px,py,pw) {
    const SW=40, count=Math.max(1,Math.floor(pw/SW)), aw=pw/count;
    const sh=Math.min(aw, 52); // spike height never exceeds spike width
    for(let k=0;k<count;k++) traps.push({x:px+k*aw,y:py-sh,w:aw,h:sh});
  }

  // Safe giant start pad
  platforms.push({x:20,y:380,w:280,h:24,color:W.startCol,type:'normal'});
  let x=320,y=360;

  for(let s=0;s<W.stages;s++){
    const col=W.platColors[s % W.platColors.length];
    if(s>0) checkpoints.push({x:x-30,y:y-50,w:24,h:50,stage:s});

    // RULES:
    //  • i===0 → always spike-free safe landing
    //  • type==='moving' → NEVER has spikes
    //  • Only 'normal' platforms get spikes

    if(s===0){
      // Pure intro — zero spikes
      for(let i=0;i<5;i++){
        platforms.push({x,y,w:160,h:22,color:col,type:'normal'});
        x+=210; y+=(i%2===0?-28:26); y=clamp(y,130,460);
      }
    }else if(s===1){
      // Gaps: wider spiked platforms, big safe edges
      for(let i=0;i<6;i++){
        const pw=i===0?190:360;
        platforms.push({x,y,w:pw,h:22,color:col,type:'normal'});
        if(i>=2&&i%2===0) addSpikes(x+80,y,pw-160);
        x+=pw+50; y+=(i%2===0?-34:28); y=clamp(y,120,460);
      }
    }else if(s===2){
      // Moving platforms — NO spikes
      for(let i=0;i<6;i++){
        const pw=i===0?190:240;
        platforms.push({x,y,w:pw,h:22,color:col,type:'moving',ox:x,range:70,speed:.024,phase:i*.9});
        x+=pw+55; y+=(i%2===0?-42:34); y=clamp(y,110,450);
      }
    }else if(s===3){
      // Bounce pads + spiked normal — very wide, spikes in middle
      for(let i=0;i<7;i++){
        const isBounce=i>0&&i%3===0;
        const pw=i===0?190:(isBounce?150:380);
        const type=i===0?'normal':(isBounce?'bounce':'normal');
        platforms.push({x,y,w:pw,h:22,color:col,type});
        if(i>0&&!isBounce) addSpikes(x+80,y,pw-160);
        x+=pw+48; y+=(i%2===0?-38:38); y=clamp(y,105,450);
      }
    }else if(s===4){
      // Spike gauntlet — very wide, spikes in middle, clear edges
      for(let i=0;i<6;i++){
        const pw=i===0?190:400;
        platforms.push({x,y,w:pw,h:22,color:col,type:'normal'});
        if(i>0) addSpikes(x+80,y,pw-160);
        x+=pw+54; y+=(i%2===0?-48:30); y=clamp(y,100,445);
      }
    }else if(s===5){
      // Moving alternating with wide spiked static
      for(let i=0;i<8;i++){
        const isMoving=i%2===1&&i>0;
        const pw=i===0?190:(isMoving?220:380);
        const type=isMoving?'moving':'normal';
        platforms.push({x,y,w:pw,h:22,color:col,type,ox:x,range:90,speed:.047,phase:i*.7});
        if(!isMoving&&i>0) addSpikes(x+80,y,pw-160);
        x+=pw+55; y+=(i%2===0?-50:36); y=clamp(y,95,440);
      }
    }else if(s===6){
      // Wide platforms with spike islands in centre
      for(let i=0;i<7;i++){
        const pw=i===0?180:380;
        platforms.push({x,y,w:pw,h:22,color:col,type:'normal'});
        if(i>0) addSpikes(x+100,y,pw-200);
        x+=pw+44; y+=(i%2===0?-50:52); y=clamp(y,90,440);
      }
    }else if(s===7){
      // Moving + wide spiked static mixed
      for(let i=0;i<8;i++){
        const isMoving=i%3===1&&i>0;
        const pw=i===0?190:(isMoving?220:380);
        const type=isMoving?'moving':'normal';
        platforms.push({x,y,w:pw,h:22,color:col,type,ox:x,range:78,speed:.043,phase:i*.6});
        if(!isMoving&&i>0) addSpikes(x+80,y,pw-160);
        x+=pw+52; y+=(i%2===0?-54:42); y=clamp(y,88,438);
      }
    }else if(s===8){
      // Chaos: normal=spiked and very wide
      const types=['normal','moving','bounce','normal','normal','moving','bounce','normal'];
      for(let i=0;i<8;i++){
        const t=i===0?'normal':types[i];
        const pw=i===0?190:(t==='moving'?220:(t==='bounce'?150:380));
        platforms.push({x,y,w:pw,h:22,color:col,type:t,ox:x,range:86,speed:.057,phase:i*.5});
        if(i>0&&t==='normal') addSpikes(x+80,y,pw-160);
        x+=pw+52; y+=(i%2===0?-58:44); y=clamp(y,85,435);
      }
    }else{
      // FINAL stage — wide spiked static alternating with moving
      for(let i=0;i<10;i++){
        const isMoving=i%2===1&&i>0;
        const pw=i===0?190:(isMoving?210:360);
        const type=isMoving?'moving':'normal';
        platforms.push({x,y,w:pw,h:22,color:'#ff2d78',type,
          ox:x,range:52+i*8,speed:.068+i*.004,phase:i*.65});
        if(!isMoving&&i>0) addSpikes(x+80,y,pw-160);
        x+=pw+48; y+=(i%2===0?-56:50); y=clamp(y,84,432);
      }
    }
    x+=24;
  }

  platforms.push({x,y,w:300,h:28,color:W.finCol,type:'finish'});

  // Spawn fruits on safe platforms (not first platform of stage, not spiked)
  levelFruits=[];
  for(const p of platforms){
    if(p.type==='normal'&&p.w>=160&&Math.random()<0.35){
      const f=FRUITS[Math.floor(Math.random()*FRUITS.length)];
      levelFruits.push({
        x: p.x+p.w/2-14, y: p.y-38,
        w:28, h:28,
        fruit:f, collected:false,
        bob:Math.random()*Math.PI*2
      });
    }
  }
  return {platforms,traps,checkpoints};
}

function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}

function startWorld(wid){
  boss=null; bossPhase='idle'; lasers=[]; bossDefeated=false;
  currentWorld=wid;
  const W=WORLDS[wid];
  level=genLevel(wid);
  deaths=0; elapsed=0; checkpoint=null; currentStage=0; cameraX=0; stageBlocks={};
  player.speedMult=1; player.jumpMult=1; player.fruitCount=0; player.activeFruits=[];

}

function spawnPlayer(cx,cy){

}

function die(){

}

function spawnParticles(x,y,color,n=8){
  for(let i=0;i<n;i++) particles.push({
    x,y,vx:(Math.random()-.5)*7,vy:(Math.random()-2.2)*5,
    r:4+Math.random()*5,life:1,color

}

// ═══════════════════════════════════
//  UPDATE
// ═══════════════════════════════════
function update(dt){
  elapsed+=dt;
  document.getElementById('hud-timer').textContent=elapsed.toFixed(1)+'s';
  document.getElementById('hud-fruits').textContent='x'+player.fruitCount;
  document.getElementById('hud-speed').textContent=player.speedMult.toFixed(1)+'x';

  for(const p of level.platforms)
    if(p.type==='moving') p.x=p.ox+Math.sin(elapsed*p.speed*60+p.phase)*p.range;

  const left=keys['ArrowLeft']||keys['KeyA'];
  const right=keys['ArrowRight']||keys['KeyD'];
  const jump=keys['Space']||keys['ArrowUp']||keys['KeyW'];

  if(left) player.vx=-5.2*player.speedMult;
  else if(right) player.vx=5.2*player.speedMult;
  else player.vx*=0.74;

  if(jump&&!keys['_jh']){
    if(player.jumpCount<2){
      player.vy=-14.5*player.jumpMult; player.jumpCount++;
      player.squish=0.58;
      spawnParticles(player.x+player.w/2,player.y+player.h,'#00f5ff',5);
    }
    keys['_jh']=true;
  }
  if(!jump) keys['_jh']=false;

  player.vy=Math.min(player.vy+0.72,20);
  player.x+=player.vx; player.y+=player.vy;
  player.squish+=(1-player.squish)*0.2;

  // Platform collision
  player.onGround=false;
  for(const p of level.platforms){
    if(player.x+player.w>p.x&&player.x<p.x+p.w&&
       player.y+player.h>p.y&&player.y+player.h<p.y+p.h+player.vy+2&&player.vy>=0){
      player.y=p.y-player.h;
      if(p.type==='bounce'){player.vy=-19;spawnParticles(player.x+player.w/2,player.y+player.h,'#ff6b35',7);}
      else player.vy=0;
      player.onGround=true; player.jumpCount=0; player.squish=1.3;
      if(p.type==='finish'){startBossFight();return;}
    }
  }

  // Fruit collection
  for(const f of levelFruits){
    if(f.collected) continue;
    if(player.x+player.w>f.x&&player.x<f.x+f.w&&
       player.y+player.h>f.y&&player.y<f.y+f.h){
      f.collected=true;
      player.fruitCount++;
      earnCoins(1,'fruit collected');
      const fr=f.fruit;
      // Apply effect — stacks with existing
      if(fr.effect==='speed'||fr.effect==='both') player.speedMult=Math.min(player.speedMult+fr.value, 2.5);
      if(fr.effect==='jump' ||fr.effect==='both') player.jumpMult =Math.min(player.jumpMult +fr.value, 2.5);
      // Track active fruit with timer
      player.activeFruits.push({...fr, timeLeft:fr.duration});
      spawnParticles(f.x+f.w/2,f.y,fr.color,12);
      // Toast
      const toastEl=document.getElementById('cp-toast');
      toastEl.textContent=`${fr.emoji} ${fr.name}! Speed x${player.speedMult.toFixed(1)}`;
      toastEl.style.background=`linear-gradient(135deg,${fr.color},#ff9900)`;
      toastEl.style.color='#000';
      showToast('cp-toast',1800);
      setTimeout(()=>{
        toastEl.style.background='linear-gradient(135deg,#39ff14,#00c87a)';
        toastEl.textContent='✅ Checkpoint!';
      },2200);
    }
  }

  // Decay fruit effects over time
  for(let i=player.activeFruits.length-1;i>=0;i--){
    player.activeFruits[i].timeLeft-=dt;
    if(player.activeFruits[i].timeLeft<=0){
      const expired=player.activeFruits.splice(i,1)[0];
      // Recalculate multipliers from remaining active fruits
      player.speedMult=1; player.jumpMult=1;
      for(const af of player.activeFruits){
        if(af.effect==='speed'||af.effect==='both') player.speedMult=Math.min(player.speedMult+af.value,2.5);
        if(af.effect==='jump' ||af.effect==='both') player.jumpMult =Math.min(player.jumpMult +af.value,2.5);
      }
    }
  }

  // Spike collision
  for(const t of level.traps){
    if(player.x+player.w-5>t.x&&player.x+5<t.x+t.w&&
       player.y+player.h>t.y+10&&player.y<t.y+t.h){
      spawnParticles(player.x+player.w/2,player.y+player.h/2,'#ff2d78',14);
      die();return;
    }
  }

  // Checkpoints — 1 block per unique stage
  for(const cp of level.checkpoints){
    if(player.x+player.w>cp.x&&player.x<cp.x+cp.w&&
       player.y+player.h>cp.y&&player.y<cp.y+cp.h){
      if(!checkpoint||checkpoint.stage<cp.stage){
        checkpoint=cp; currentStage=cp.stage;
        const W2=WORLDS[currentWorld];
        document.getElementById('hud-stage').textContent=`${cp.stage+1}/${WORLDS[currentWorld].stages}`;
        document.getElementById('pbar').style.width=((cp.stage/WORLDS[currentWorld].stages)*100)+'%';
        showToast('cp-toast');
        spawnParticles(cp.x+cp.w/2,cp.y,'#39ff14',14);
        if(!stageBlocks[cp.stage]){
          stageBlocks[cp.stage]=true;
          totalBlocks += 2;
          playerLevel = Math.floor(totalBlocks/20)+1;
          localStorage.setItem('obby_blocks', totalBlocks);
          document.getElementById('hud-blocks').textContent=totalBlocks;
          const t=document.getElementById('blk-toast');
          t.textContent='🧱 +2 Blocks! Stage Complete!';
          setTimeout(()=>showToast('blk-toast'),700);
          setTimeout(()=>earnCoins(2,'checkpoint'),1200);
        }
      }
    }
  }

  // Boss fight
  updateBoss(dt);

  if(player.y>canvas.height+120){
    spawnParticles(player.x+player.w/2,canvas.height,'#ff2d78',10);
    die();return;
  }

  cameraX+=(player.x-canvas.width/3-cameraX)*0.1;
  player.trail.push({x:player.x+player.w/2,y:player.y+player.h/2});
  if(player.trail.length>12) player.trail.shift();

  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.28;p.life-=0.038;
    if(p.life<=0) particles.splice(i,1);
  }
}

// ═══════════════════════════════════
//  BOSS FIGHT
// ═══════════════════════════════════
const BOSS_COLORS={1:{body:'#cc2244',eye:'#ff0000',detail:'#881122'},2:{body:'#336622',eye:'#aaff44',detail:'#224411'},3:{body:'#224488',eye:'#44aaff',detail:'#112255'}};
let boss=null, bossArena=null, bossPhase='idle', bossHits=0, bossMaxHits=3;
let lasers=[], bossWarnTimer=0, bossLaserTimer=0, bossShakeTimer=0;
let bossIntroTimer=0, bossDefeated=false;

function startBossFight(){
  // Lock player onto arena platform
  const fin=level.platforms.find(p=>p.type==='finish');
  bossArena={x:fin.x-100, y:fin.y, w:fin.w+200, floorY:fin.y};

  const C=BOSS_COLORS[currentWorld];
  boss={
    x: fin.x + fin.w/2 - 60,
    y: fin.y - 280,
    w:120, h:200,
    vx:1.8, vy:0,
    hp:3, maxHp:3,
    color:C.body, eyeColor:C.eye, detailColor:C.detail,
    stomping:false, stompTimer:0,
    armAngle:0, eyePulse:0,
    warningBeam:null,
    invincible:0,
    deadTimer:0,
  };
  bossHits=0; bossDefeated=false;
  lasers=[];
  bossPhase='fight';
  bossIntroTimer=2.5;
  bossLaserTimer=3;
  bossWarnTimer=0;

  // Show boss intro toast
  const toastEl=document.getElementById('cp-toast');
  toastEl.textContent='⚠️ BOSS APPEARS!';
  toastEl.style.background='linear-gradient(135deg,#ff2d78,#ff6b00)';
  toastEl.style.color='#fff';
  showToast('cp-toast',2500);
  setTimeout(()=>{
    toastEl.textContent='✅ Checkpoint!';
    toastEl.style.background='linear-gradient(135deg,#39ff14,#00c87a)';
    toastEl.style.color='#000';
  },3000);
}

function updateBoss(dt){
  if(!boss||bossPhase!=='fight') return;

  boss.eyePulse+=dt*4;
  boss.armAngle=Math.sin(elapsed*3)*0.3;
  boss.invincible=Math.max(0,boss.invincible-dt);

  const fin=level.platforms.find(p=>p.type==='finish');
  const arenaLeft=fin.x-80, arenaRight=fin.x+fin.w+80;

  // Boss intro — just shake and pose
  if(bossIntroTimer>0){ bossIntroTimer-=dt; return; }

  // Boss walking
  boss.x+=boss.vx;
  if(boss.x<arenaLeft){boss.x=arenaLeft;boss.vx=Math.abs(boss.vx);}
  if(boss.x+boss.w>arenaRight){boss.x=arenaRight-boss.w;boss.vx=-Math.abs(boss.vx);}

  // Boss gravity
  boss.vy=Math.min(boss.vy+0.5,15);
  boss.y+=boss.vy;
  if(boss.y+boss.h>=fin.y){boss.y=fin.y-boss.h;boss.vy=0;}

  // Laser warning → fire
  bossLaserTimer-=dt;
  if(bossLaserTimer<=0){
    // Show warning beam first
    boss.warningBeam={x:boss.x+boss.w/2, y:boss.y+boss.h*0.55, timer:0.9};
    bossWarnTimer=0.9;
    bossLaserTimer=3.5 - bossHits*0.5;
  }
  if(boss.warningBeam){
    boss.warningBeam.timer-=dt;
    if(boss.warningBeam.timer<=0){
      // Fire actual laser
      lasers.push({
        x:boss.warningBeam.x-6, y:boss.warningBeam.y,
        w:12, h:canvas.height,
        life:0.5, maxLife:0.5
      });
      boss.warningBeam=null;
    }
  }

  // Laser update
  for(let i=lasers.length-1;i>=0;i--){
    lasers[i].life-=dt;
    if(lasers[i].life<=0) lasers.splice(i,1);
  }

  // Laser hit player
  for(const l of lasers){
    if(player.x+player.w>l.x&&player.x<l.x+l.w&&player.y+player.h>l.y&&player.y<l.y+l.h){
      spawnParticles(player.x+player.w/2,player.y,'#ff2d78',12);
      die(); return;
    }
  }

  // Player stomps boss head (jump on top)
  if(
    boss.invincible<=0 &&
    player.x+player.w>boss.x+10 && player.x<boss.x+boss.w-10 &&
    player.y+player.h>boss.y && player.y+player.h<boss.y+40 &&
    player.vy>0
  ){
    // Hit!
    boss.hp--;
    bossHits++;
    boss.invincible=1.5;
    boss.vx*=-1.4;
    player.vy=-16;
    spawnParticles(boss.x+boss.w/2,boss.y,'#ff6600',18);
    bossShakeTimer=0.3;

    // Update HP toast
    const remaining=boss.hp;
    const toastEl=document.getElementById('cp-toast');
    toastEl.textContent= remaining>0 ? `💥 HIT! ${remaining} HP left!` : '💥 BOSS DEFEATED!';
    toastEl.style.background='linear-gradient(135deg,#ff6600,#ffcc00)';
    toastEl.style.color='#000';
    showToast('cp-toast',1500);

    if(boss.hp<=0){
      bossDefeated=true;
      bossPhase='dead';
      boss.deadTimer=2.5;
      for(let i=0;i<40;i++) spawnParticles(
        boss.x+Math.random()*boss.w,
        boss.y+Math.random()*boss.h,
        ['#ff2d78','#ffe600','#00f5ff','#39ff14'][i%4], 3
      );
      setTimeout(winWorld, 2600);
    }
  }

  // Boss touches player (body)
  if(
    player.x+player.w>boss.x+8 && player.x<boss.x+boss.w-8 &&
    player.y+player.h>boss.y+40 && player.y<boss.y+boss.h
  ){
    spawnParticles(player.x+player.w/2,player.y+player.h/2,'#ff2d78',12);
    die();
  }
}

function drawBoss(){
  if(!boss||bossPhase==='idle') return;
  const C=boss;
  const shake=bossShakeTimer>0?(Math.random()-0.5)*8:0;
  bossShakeTimer=Math.max(0,bossShakeTimer-0.016);

  const bx=C.x+shake, by=C.y;
  const bw=C.w, bh=C.h;
  const dead=bossPhase==='dead';
  const deadAlpha=dead?Math.max(0,(C.deadTimer/2.5)):1;

  ctx.save();
  ctx.globalAlpha=deadAlpha;

  // ── LEGS ──
  const legOff=Math.sin(elapsed*8)*8;
  ctx.fillStyle=shadeColor(C.color,-30);
  // Left leg
  roundRect(ctx,bx+14,by+bh-50,28,55,6); ctx.fill();
  // Right leg
  roundRect(ctx,bx+bw-42,by+bh-50+legOff,28,55,6); ctx.fill();

  // ── BODY ──
  const bodyGrd=ctx.createLinearGradient(bx,by,bx+bw,by+bh);
  bodyGrd.addColorStop(0,C.color); bodyGrd.addColorStop(1,shadeColor(C.color,-50));
  ctx.fillStyle=bodyGrd;
  ctx.shadowColor=C.color; ctx.shadowBlur=20;
  roundRect(ctx,bx+8,by+bh*0.38,bw-16,bh*0.52,10); ctx.fill();
  ctx.shadowBlur=0;

  // Body detail — chest panel
  ctx.fillStyle=shadeColor(C.color,-70);
  roundRect(ctx,bx+20,by+bh*0.44,bw-40,bh*0.24,6); ctx.fill();
  // Chest lights
  const lightColors=['#ff2d78','#ffe600','#00f5ff'];
  for(let i=0;i<3;i++){
    ctx.fillStyle=lightColors[i];
    ctx.shadowColor=lightColors[i]; ctx.shadowBlur=10;
    ctx.beginPath(); ctx.arc(bx+34+i*22,by+bh*0.56,5,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
  }

  // ── ARMS ──
  ctx.fillStyle=shadeColor(C.color,-20);
  // Left arm
  ctx.save();
  ctx.translate(bx+8,by+bh*0.42);
  ctx.rotate(-C.armAngle-0.3);
  roundRect(ctx,-10,0,20,60,6); ctx.fill();
  // Left fist
  ctx.fillStyle=C.color; roundRect(ctx,-14,56,28,24,5); ctx.fill();
  ctx.restore();
  // Right arm
  ctx.save();
  ctx.translate(bx+bw-8,by+bh*0.42);
  ctx.rotate(C.armAngle+0.3);
  roundRect(ctx,-10,0,20,60,6); ctx.fill();
  ctx.fillStyle=C.color; roundRect(ctx,-14,56,28,24,5); ctx.fill();
  ctx.restore();

  // ── HEAD ──
  const headGrd=ctx.createLinearGradient(bx,by,bx+bw,by+bh*0.4);
  headGrd.addColorStop(0,C.color); headGrd.addColorStop(1,shadeColor(C.color,-30));
  ctx.fillStyle=headGrd;
  ctx.shadowColor=C.color; ctx.shadowBlur=15;
  roundRect(ctx,bx+6,by,bw-12,bh*0.42,12); ctx.fill();
  ctx.shadowBlur=0;

  // Antenna
  ctx.strokeStyle=C.color; ctx.lineWidth=5;
  ctx.beginPath(); ctx.moveTo(bx+bw/2,by); ctx.lineTo(bx+bw/2,by-28); ctx.stroke();
  ctx.fillStyle=C.eyeColor; ctx.shadowColor=C.eyeColor; ctx.shadowBlur=16;
  ctx.beginPath(); ctx.arc(bx+bw/2,by-32,8,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;

  // Eyes — single visor bar or angry eyes
  if(!dead){
    const eyePulseAlpha=0.7+0.3*Math.sin(C.eyePulse);
    ctx.fillStyle=C.eyeColor; ctx.globalAlpha=deadAlpha*eyePulseAlpha;
    ctx.shadowColor=C.eyeColor; ctx.shadowBlur=18;
    // Angry eye slants
    const ey=by+bh*0.14;
    roundRect(ctx,bx+16,ey,26,14,4); ctx.fill();
    roundRect(ctx,bx+bw-42,ey,26,14,4); ctx.fill();
    // Pupils
    ctx.fillStyle='#fff'; ctx.shadowBlur=0; ctx.globalAlpha=deadAlpha;
    ctx.fillRect(bx+26,ey+3,8,8); ctx.fillRect(bx+bw-32,ey+3,8,8);
  } else {
    // Dead X eyes
    ctx.strokeStyle='#fff'; ctx.lineWidth=4; ctx.globalAlpha=deadAlpha;
    const ey=by+bh*0.14;
    ctx.beginPath(); ctx.moveTo(bx+16,ey); ctx.lineTo(bx+42,ey+14); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bx+42,ey); ctx.lineTo(bx+16,ey+14); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bx+bw-42,ey); ctx.lineTo(bx+bw-16,ey+14); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bx+bw-16,ey); ctx.lineTo(bx+bw-42,ey+14); ctx.stroke();
  }

  // Mouth — angry grill
  ctx.globalAlpha=deadAlpha;
  ctx.fillStyle=shadeColor(C.color,-80);
  roundRect(ctx,bx+20,by+bh*0.3,bw-40,12,4); ctx.fill();
  for(let i=0;i<5;i++){
    ctx.fillStyle=C.eyeColor; ctx.globalAlpha=deadAlpha*0.6;
    ctx.fillRect(bx+24+i*16,by+bh*0.3+2,8,8);
  }
  ctx.globalAlpha=deadAlpha;

  // HP bar above boss
  if(!dead){
    const barW=bw+20, barH=12, barX=bx-10, barY=by-22;
    ctx.fillStyle='rgba(0,0,0,0.6)'; roundRect(ctx,barX,barY,barW,barH,4); ctx.fill();
    const hpFrac=Math.max(0,boss.hp/boss.maxHp);
    const hpColor=hpFrac>0.6?'#39ff14':hpFrac>0.3?'#ffe600':'#ff2d78';
    ctx.fillStyle=hpColor; ctx.shadowColor=hpColor; ctx.shadowBlur=8;
    roundRect(ctx,barX+2,barY+2,(barW-4)*hpFrac,barH-4,3); ctx.fill();
    ctx.shadowBlur=0;
    ctx.fillStyle='#fff'; ctx.font='bold 10px Nunito'; ctx.textAlign='center';
    ctx.fillText('BOSS HP',barX+barW/2,barY-4);
  }

  // Warning beam
  if(boss.warningBeam){
    const prog=1-(boss.warningBeam.timer/0.9);
    ctx.globalAlpha=0.15+prog*0.3;
    ctx.fillStyle='#ff4400';
    ctx.fillRect(boss.warningBeam.x-8,boss.warningBeam.y,16,canvas.height);
    // Warning flash
    ctx.globalAlpha=0.5*Math.sin(elapsed*20);
    ctx.fillStyle='#ffaa00';
    ctx.fillRect(boss.warningBeam.x-3,boss.warningBeam.y,6,canvas.height);
  }
  ctx.globalAlpha=1;

  // Active lasers
  for(const l of lasers){
    const lp=l.life/l.maxLife;
    ctx.globalAlpha=lp;
    ctx.fillStyle='#ff4400'; ctx.shadowColor='#ff6600'; ctx.shadowBlur=30;
    ctx.fillRect(l.x,l.y,l.w,l.h);
    ctx.fillStyle='#ffff88';
    ctx.fillRect(l.x+3,l.y,l.w-6,l.h);
    ctx.shadowBlur=0;
  }
  ctx.globalAlpha=1;

  // Dead boss timer countdown
  if(dead){ C.deadTimer-=0.016; }

  ctx.restore();

  // STOMP ON ME hint text
  if(!dead && bossIntroTimer<=0){
    ctx.save();
    ctx.globalAlpha=0.5+0.5*Math.sin(elapsed*4);
    ctx.fillStyle='#ffe600'; ctx.font='bold 14px Fredoka One';
    ctx.textAlign='center';
    ctx.fillText('⬆ JUMP ON ITS HEAD!', C.x+C.w/2, C.y-40);
    ctx.restore();
  }
}

// ═══════════════════════════════════
//  DRAW
// ═══════════════════════════════════
function draw(){
  const W=WORLDS[currentWorld];
  const si=clamp(currentStage,0,9);

  const grad=ctx.createLinearGradient(0,0,0,canvas.height);
  grad.addColorStop(0,W.bgTop[si]); grad.addColorStop(1,W.bgBot[si]);
  ctx.fillStyle=grad; ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.save();
  if(W.env==='stars'){
    for(let i=0;i<90;i++){
      const sx=(i*137+50)%canvas.width, sy=(i*97+30)%(canvas.height*.72);
      ctx.globalAlpha=.28+.55*Math.sin(elapsed*2+i);
      ctx.fillStyle='#fff'; ctx.fillRect(sx,sy,2,2);
    }
  }else if(W.env==='clouds'){
    for(let i=0;i<8;i++){
      const cx=((i*240+elapsed*16)%(canvas.width+280))-140, cy=40+i*60;
      ctx.globalAlpha=.06; ctx.fillStyle='#cceebb';
      ctx.beginPath(); ctx.ellipse(cx,cy,115,32,0,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=.055; ctx.fillStyle='#336622';
    for(let i=0;i<5;i++){
      const mx=(i*320+100-cameraX*.06)%(canvas.width+340)-170;
      ctx.beginPath(); ctx.moveTo(mx,canvas.height);
      ctx.lineTo(mx+160,canvas.height-185); ctx.lineTo(mx+320,canvas.height);
      ctx.closePath(); ctx.fill();
    }
  }else if(W.env==='dungeon'){
    for(let i=0;i<14;i++){
      const ox=(i*173+80)%canvas.width, oy=(i*91+60)%(canvas.height*.85);
      ctx.globalAlpha=.06+.05*Math.sin(elapsed*1.4+i);
      ctx.fillStyle='#aa44ff';
      ctx.beginPath(); ctx.arc(ox,oy,22,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=.035; ctx.strokeStyle='#665577'; ctx.lineWidth=1;
    for(let i=0;i<14;i++){
      const ly=i*(canvas.height/14);
      ctx.beginPath(); ctx.moveTo(0,ly); ctx.lineTo(canvas.width,ly); ctx.stroke();
    }
  }
  ctx.globalAlpha=1; ctx.restore();

  ctx.save();
  ctx.translate(-cameraX,0);

  // Platforms
  for(const p of level.platforms){
    const grd=ctx.createLinearGradient(p.x,p.y,p.x,p.y+p.h);
    grd.addColorStop(0,p.color); grd.addColorStop(1,shadeColor(p.color,-45));
    ctx.shadowColor=p.color; ctx.shadowBlur=p.type==='finish'?28:10;
    ctx.fillStyle=grd; roundRect(ctx,p.x,p.y,p.w,p.h,6); ctx.fill();
    ctx.shadowBlur=0;
    ctx.fillStyle='rgba(255,255,255,.2)'; roundRect(ctx,p.x+4,p.y+2,p.w-8,6,4); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.26)';
    const studs=Math.floor(p.w/32);
    for(let i=0;i<studs;i++){ctx.beginPath();ctx.arc(p.x+16+i*32,p.y-4,5,0,Math.PI*2);ctx.fill();}
    if(p.type==='bounce'){ctx.font='13px sans-serif';ctx.textAlign='center';ctx.fillText('🟠',p.x+p.w/2,p.y+15);}
    if(p.type==='finish'){ctx.fillStyle='#000';ctx.font='bold 16px Fredoka One';ctx.textAlign='center';ctx.fillText('🏁 FINISH!',p.x+p.w/2,p.y+18);}
  }

  // Spikes
  for(const t of level.traps){
    ctx.shadowColor=W.spikeG; ctx.shadowBlur=28;
    const sg=ctx.createLinearGradient(t.x,t.y,t.x,t.y+t.h);
    sg.addColorStop(0,W.spikeT); sg.addColorStop(.3,W.spikeM); sg.addColorStop(1,W.spikeB);
    ctx.fillStyle=sg;
    // Fat triangular spike
    ctx.beginPath();
    ctx.moveTo(t.x+4,       t.y+t.h);   // bottom-left
    ctx.lineTo(t.x+t.w/2,   t.y);       // sharp tip
    ctx.lineTo(t.x+t.w-4,   t.y+t.h);  // bottom-right
    ctx.closePath(); ctx.fill();
    // Inner bright shine line
    ctx.shadowBlur=0;
    ctx.strokeStyle='rgba(255,245,160,.75)'; ctx.lineWidth=2.5;
    ctx.beginPath();
    ctx.moveTo(t.x+t.w/2-2, t.y+t.h-10);
    ctx.lineTo(t.x+t.w/2,   t.y+6);
    ctx.stroke();
    // Second subtle shine for depth
    ctx.strokeStyle='rgba(255,255,255,.2)'; ctx.lineWidth=1.2;
    ctx.beginPath();
    ctx.moveTo(t.x+t.w*.35, t.y+t.h-8);
    ctx.lineTo(t.x+t.w*.42, t.y+t.h*.35);
    ctx.stroke();
  }
  ctx.shadowBlur=0;

  // Fruits
  for(const f of levelFruits){
    if(f.collected) continue;
    f.bob+=0.05;
    const fy=f.y+Math.sin(f.bob)*5;
    // Glow
    ctx.shadowColor=f.fruit.color; ctx.shadowBlur=18;
    ctx.font='26px sans-serif'; ctx.textAlign='center';
    ctx.fillText(f.fruit.emoji, f.x+f.w/2, fy+22);
    ctx.shadowBlur=0;
    // Speed label
    ctx.font='bold 9px Nunito'; ctx.fillStyle='#fff';
    ctx.fillText(f.fruit.effect==='speed'?'⚡SPEED':f.fruit.effect==='jump'?'⬆JUMP':'✨BOTH', f.x+f.w/2, fy+36);
  }

  // Flags
  for(const cp of level.checkpoints){
    const hit=checkpoint&&checkpoint.stage>=cp.stage;
    ctx.shadowColor=hit?'#39ff14':'transparent'; ctx.shadowBlur=hit?14:0;
    ctx.fillStyle=hit?'#39ff14':'rgba(255,255,255,.28)';
    ctx.fillRect(cp.x+cp.w/2-2,cp.y,4,cp.h);
    ctx.fillStyle=hit?'#39ff14':'#fff';
    ctx.beginPath(); ctx.moveTo(cp.x+cp.w/2+2,cp.y+4); ctx.lineTo(cp.x+cp.w/2+22,cp.y+14); ctx.lineTo(cp.x+cp.w/2+2,cp.y+24); ctx.closePath(); ctx.fill();
    ctx.shadowBlur=0;
  }

  // Boss
  drawBoss();

  // Trail — color changes with active fruit boost
  const trailColor = player.activeFruits.length>0 ? player.activeFruits[player.activeFruits.length-1].color : '#ff2d78';
  for(let i=0;i<player.trail.length;i++){
    const t=player.trail[i];
    ctx.globalAlpha=(i/player.trail.length)*.44;
    ctx.fillStyle=trailColor;
    ctx.beginPath(); ctx.arc(t.x,t.y,(i/player.trail.length)*10,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;

  // Player
  const pw=player.w,ph=player.h*player.squish,py=player.y+player.h-ph,px=player.x;
  ctx.shadowColor='#ff2d78'; ctx.shadowBlur=18;
  const bg=ctx.createLinearGradient(px,py,px+pw,py+ph);
  bg.addColorStop(0,'#ff6fa3'); bg.addColorStop(1,'#cc1155');
  ctx.fillStyle=bg; roundRect(ctx,px,py+ph*.35,pw,ph*.65,5); ctx.fill();
  ctx.fillStyle='#ffd6a5'; roundRect(ctx,px+4,py,pw-8,ph*.45,6); ctx.fill();
  ctx.fillStyle='#111';
  ctx.beginPath(); ctx.arc(px+9,py+ph*.18,3.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(px+pw-9,py+ph*.18,3.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.4)'; ctx.fillRect(px+pw-10,py+3,5,3);
  ctx.shadowBlur=0;

  // Particles
  for(const p of particles){
    ctx.globalAlpha=p.life; ctx.fillStyle=p.color;
    ctx.shadowColor=p.color; ctx.shadowBlur=10;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1; ctx.shadowBlur=0;
  ctx.restore();
}

// ═══════════════════════════════════
//  HELPERS
// ═══════════════════════════════════
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}
function shadeColor(hex,amt){
  const n=parseInt(hex.replace('#',''),16);
  const r=clamp((n>>16)+amt,0,255), g=clamp(((n>>8)&0xff)+amt,0,255), b=clamp((n&0xff)+amt,0,255);
  return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}

// ═══════════════════════════════════
//  LOOP
// ═══════════════════════════════════
function loop(ts){
  const dt=Math.min((ts-lastTime)/1000,.05); lastTime=ts;
  if(gameRunning){update(dt);draw();requestAnimationFrame(loop);}
}

window.addEventListener('resize',()=>{
  canvas.width=window.innerWidth; canvas.height=window.innerHeight-50;
});

// Boot — load saved progress
totalBlocks = parseInt(localStorage.getItem('obby_blocks')||'0');
totalCoins  = parseInt(localStorage.getItem('obby_coins') ||'0');
playerLevel = parseInt(localStorage.getItem('obby_level') ||'1');
usedCodes   = JSON.parse(localStorage.getItem('obby_usedCodes')||'[]');
document.getElementById('hud-blocks').textContent = totalBlocks;
document.getElementById('hud-coins').textContent  = totalCoins;
showMenu();
</script>
